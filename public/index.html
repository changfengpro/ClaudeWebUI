<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>claude-web</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><text y='20' font-size='20'>✦</text></svg>">
<link rel="stylesheet" href="/vendor/highlight-github-dark.min.css">
<style>
  /* ---------- 字体 ---------- */
  @font-face { font-family: 'Geist'; src: url('/vendor/fonts/geist-400.woff2') format('woff2'); font-weight: 400; font-display: swap; }
  @font-face { font-family: 'Geist'; src: url('/vendor/fonts/geist-500.woff2') format('woff2'); font-weight: 500; font-display: swap; }
  @font-face { font-family: 'Geist'; src: url('/vendor/fonts/geist-600.woff2') format('woff2'); font-weight: 600; font-display: swap; }
  @font-face { font-family: 'Geist Mono'; src: url('/vendor/fonts/geist-mono-400.woff2') format('woff2'); font-weight: 400; font-display: swap; }
  @font-face { font-family: 'Geist Mono'; src: url('/vendor/fonts/geist-mono-500.woff2') format('woff2'); font-weight: 500; font-display: swap; }

  /* ---------- 主题变量 ---------- */
  :root[data-theme="dark"] {
    --bg: #15161e; --glow: rgba(122,162,247,.07);
    --s1: #1a1b26; --s2: #1f2031; --s3: #262a40; --s-code: #0e0f17;
    --line: rgba(255,255,255,.06); --line-2: rgba(255,255,255,.10);
    --text: #c6d0f5; --dim: #828bb8; --faint: #565f89;
    --accent: #7aa2f7; --accent-ink: #0b0e18; --cyan: #7dcfff;
    --claude: #bb9af7; --codex: #73daca; --danger: #f7768e; --green: #9ece6a;
    --shadow: 0 10px 34px rgba(0,0,0,.40); --shadow-sm: 0 2px 10px rgba(0,0,0,.30);
  }
  :root[data-theme="light"] {
    --bg: #eceef4; --glow: rgba(46,125,233,.06);
    --s1: #ffffff; --s2: #f4f5fa; --s3: #e7eaf3; --s-code: #11131c;
    --line: rgba(40,44,90,.09); --line-2: rgba(40,44,90,.15);
    --text: #2b3052; --dim: #5b6286; --faint: #8b90b0;
    --accent: #2e7de9; --accent-ink: #ffffff; --cyan: #1e88c7;
    --claude: #8a52e0; --codex: #0f8a73; --danger: #e8456b; --green: #4a9b25;
    --shadow: 0 10px 30px rgba(40,44,90,.10); --shadow-sm: 0 2px 10px rgba(40,44,90,.07);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    display: flex; color: var(--text); background: var(--bg);
    font: 14.5px/1.65 'Geist', -apple-system, 'Noto Sans CJK SC', sans-serif;
    -webkit-font-smoothing: antialiased; letter-spacing: .005em;
    background-image: radial-gradient(900px 500px at 8% -5%, var(--glow), transparent 60%);
    transition: background-color .3s, color .3s;
  }
  ::selection { background: color-mix(in srgb, var(--accent) 35%, transparent); }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 9px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--dim); background-clip: padding-box; }
  button { font: inherit; cursor: pointer; }

  /* ---------- 侧栏 ---------- */
  #sidebar { width: 282px; flex: 0 0 282px; background: var(--s1); border-right: 1px solid var(--line);
    display: flex; flex-direction: column; transition: margin-left .25s ease; }
  .brand { display: flex; align-items: center; gap: 10px; padding: 16px 16px 12px; }
  .brand .mark { width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center;
    background: linear-gradient(140deg, var(--accent), var(--claude)); color: var(--accent-ink); box-shadow: var(--shadow-sm); }
  .brand .mark svg { width: 16px; height: 16px; }
  .brand .name { font-weight: 600; font-size: 15px; letter-spacing: -.01em; }
  .brand .name b { color: var(--accent); }
  .brand .spacer { flex: 1; }

  .side-pad { padding: 0 12px; }
  #newBtn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px; margin-bottom: 10px; border: 1px solid var(--line-2); border-radius: 11px;
    background: linear-gradient(180deg, var(--s2), var(--s1)); color: var(--text); font-weight: 550;
    transition: .18s; }
  #newBtn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  #newBtn svg { width: 16px; height: 16px; }

  .search-wrap { position: relative; margin-bottom: 10px; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--faint); pointer-events: none; }
  #search { width: 100%; padding: 9px 10px 9px 34px; background: var(--s2); border: 1px solid var(--line);
    border-radius: 10px; color: var(--text); outline: none; transition: .18s; }
  #search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent); }
  #search::placeholder { color: var(--faint); }

  #convList { flex: 1; overflow-y: auto; padding: 4px 8px 12px; }
  .group-label { font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
    color: var(--faint); padding: 12px 10px 5px; }
  .conv { position: relative; padding: 9px 11px; border-radius: 10px; margin-bottom: 2px; cursor: pointer;
    display: flex; flex-direction: column; gap: 3px; border: 1px solid transparent;
    animation: slideIn .3s ease both; }
  .conv:hover { background: var(--s2); }
  .conv.active { background: var(--s2); border-color: var(--line-2); }
  .conv.active::before { content: ''; position: absolute; left: 0; top: 9px; bottom: 9px; width: 3px;
    border-radius: 3px; background: var(--accent); }
  .conv .t { display: flex; align-items: center; gap: 7px; }
  .conv .dot { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto; }
  .conv .dot.claude { background: var(--claude); box-shadow: 0 0 6px var(--claude); }
  .conv .dot.codex { background: var(--codex); box-shadow: 0 0 6px var(--codex); }
  .conv .name { flex: 1; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv .sub { font-size: 12px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-left: 14px; }
  .conv .acts { position: absolute; right: 8px; top: 7px; display: flex; gap: 2px; opacity: 0;
    background: linear-gradient(90deg, transparent, var(--s2) 25%); padding-left: 14px; transition: opacity .15s; }
  .conv:hover .acts, .conv.active .acts { opacity: 1; }

  .iconbtn { display: grid; place-items: center; width: 30px; height: 30px; border: 0; border-radius: 8px;
    background: transparent; color: var(--dim); transition: .15s; }
  .iconbtn:hover { background: var(--s3); color: var(--text); }
  .iconbtn svg { width: 16px; height: 16px; }
  .iconbtn.sm { width: 26px; height: 26px; } .iconbtn.sm svg { width: 14px; height: 14px; }

  .side-foot { padding: 10px 16px; border-top: 1px solid var(--line); font-size: 11.5px; color: var(--faint);
    display: flex; align-items: center; gap: 8px; }
  .side-foot .live { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 7px var(--green); }

  /* ---------- 主区 ---------- */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
  #header { height: 56px; flex: 0 0 56px; padding: 0 18px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--line); background: color-mix(in srgb, var(--bg) 75%, transparent);
    backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 5; }
  #menuBtn { display: none; }
  #hTitle { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 46%; }
  #hBadge { display: flex; align-items: center; gap: 6px; }
  .pill { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500;
    padding: 4px 10px; border-radius: 999px; border: 1px solid var(--line-2); background: var(--s2); color: var(--dim); }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; }
  .pill .dot.claude { background: var(--claude); } .pill .dot.codex { background: var(--codex); }
  .pill.model { font-family: 'Geist Mono', monospace; font-size: 11.5px; }
  .hspacer { flex: 1; }

  /* ---------- 消息线程 ---------- */
  #thread { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
  .msg { max-width: 824px; margin: 0 auto; padding: 22px 28px 6px; display: flex; gap: 14px; animation: rise .35s ease both; }
  .msg .avatar { flex: 0 0 30px; width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center;
    box-shadow: var(--shadow-sm); }
  .msg .avatar svg { width: 16px; height: 16px; }
  .msg.user .avatar { background: var(--s3); color: var(--dim); }
  .msg.assistant .avatar { color: var(--accent-ink); }
  .msg.assistant.claude .avatar { background: linear-gradient(140deg, var(--claude), var(--accent)); }
  .msg.assistant.codex .avatar { background: linear-gradient(140deg, var(--codex), var(--cyan)); }
  .msg .body { flex: 1; min-width: 0; }
  .msg .who { font-size: 12.5px; font-weight: 600; color: var(--dim); margin-bottom: 4px; letter-spacing: .01em; }
  .msg .content { word-wrap: break-word; overflow-wrap: anywhere; }
  .msg.user .content { white-space: pre-wrap; color: var(--text); }
  .msg .content > :first-child { margin-top: 0; } .msg .content > :last-child { margin-bottom: 0; }
  .msg .content p { margin: 0 0 12px; } .msg .content ul, .msg .content ol { margin: 0 0 12px; padding-left: 22px; }
  .msg .content h1, .msg .content h2, .msg .content h3 { letter-spacing: -.01em; margin: 20px 0 10px; }
  .msg .content a { color: var(--accent); text-underline-offset: 2px; }
  .msg .content blockquote { margin: 0 0 12px; padding: 2px 14px; border-left: 3px solid var(--line-2); color: var(--dim); }
  .msg .content code:not(pre code) { font-family: 'Geist Mono', monospace; font-size: .88em;
    background: var(--s3); padding: 2px 6px; border-radius: 6px; }
  .msg .content pre { background: var(--s-code); border: 1px solid var(--line); border-radius: 12px;
    margin: 0 0 12px; overflow: hidden; box-shadow: var(--shadow-sm); }
  .msg .content pre code { display: block; padding: 14px 16px; overflow-x: auto; font-family: 'Geist Mono', monospace;
    font-size: 13px; line-height: 1.6; background: transparent; }
  .codebar { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px 7px 14px;
    border-bottom: 1px solid var(--line); background: color-mix(in srgb, var(--s-code) 70%, #fff 5%); }
  .codebar .lang { font: 500 11px 'Geist Mono', monospace; color: #8b93b8; text-transform: uppercase; letter-spacing: .05em; }
  .copybtn { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; color: #8b93b8;
    background: transparent; border: 0; padding: 3px 6px; border-radius: 6px; transition: .15s; }
  .copybtn:hover { color: #d7ddf5; background: rgba(255,255,255,.07); }
  .copybtn svg { width: 13px; height: 13px; }
  .msg .content table { border-collapse: collapse; margin: 0 0 12px; font-size: 13.5px; }
  .msg .content th, .msg .content td { border: 1px solid var(--line-2); padding: 6px 11px; }
  .msg .content th { background: var(--s2); }
  .meta { font-size: 11.5px; color: var(--faint); margin-top: 8px; font-family: 'Geist Mono', monospace; }
  .badge-note { display: inline-block; font-size: 12px; color: var(--dim); margin-top: 6px; }
  .errbox { display: flex; gap: 8px; align-items: flex-start; border: 1px solid color-mix(in srgb, var(--danger) 50%, transparent);
    color: var(--danger); background: color-mix(in srgb, var(--danger) 9%, transparent); padding: 9px 12px;
    border-radius: 10px; font-size: 13px; margin-top: 8px; white-space: pre-wrap; }
  .errbox svg { width: 16px; height: 16px; flex: 0 0 auto; margin-top: 2px; }

  /* 流式：打字点 + 光标 */
  .stream-dots { display: inline-flex; gap: 4px; padding: 4px 0; }
  .stream-dots i { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); animation: bounce 1.2s infinite ease-in-out; }
  .stream-dots i:nth-child(2) { animation-delay: .15s; } .stream-dots i:nth-child(3) { animation-delay: .3s; }
  .content.cursor > :last-child::after { content: ''; display: inline-block; width: 8px; height: 1.05em;
    background: var(--accent); margin-left: 2px; vertical-align: text-bottom; border-radius: 2px; animation: blink 1s steps(2) infinite; }

  /* ---------- 空态 ---------- */
  #empty { max-width: 560px; margin: auto; padding: 48px 24px; text-align: center; animation: rise .4s ease both; }
  #empty .hero { width: 64px; height: 64px; margin: 0 auto 20px; border-radius: 18px; display: grid; place-items: center;
    background: linear-gradient(140deg, var(--accent), var(--claude)); color: var(--accent-ink); box-shadow: var(--shadow); }
  #empty .hero svg { width: 32px; height: 32px; }
  #empty h2 { font-size: 22px; font-weight: 600; letter-spacing: -.02em; margin: 0 0 8px; }
  #empty p { color: var(--dim); margin: 0 auto 22px; max-width: 440px; }
  .picker { display: flex; gap: 10px; justify-content: center; margin: 14px 0; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 6px; text-align: left; }
  .field label { font-size: 11.5px; font-weight: 600; color: var(--faint); text-transform: uppercase; letter-spacing: .04em; padding-left: 2px; }
  select, .picker textarea { font: inherit; background: var(--s2); border: 1px solid var(--line-2); color: var(--text);
    border-radius: 10px; padding: 9px 12px; outline: none; transition: .15s; }
  select:focus, .picker textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 16%, transparent); }
  .picker.full { display: block; } .picker.full textarea { width: 100%; resize: vertical; min-height: 56px; }
  .avail { font-size: 12px; color: var(--faint); margin-top: 18px; display: flex; gap: 16px; justify-content: center; }
  .avail span { display: inline-flex; align-items: center; gap: 6px; }
  .avail .dot { width: 7px; height: 7px; border-radius: 50%; }
  .avail .on { background: var(--green); } .avail .off { background: var(--danger); }

  /* ---------- 输入区 ---------- */
  #composer { padding: 8px 18px 18px; background: linear-gradient(180deg, transparent, var(--bg) 38%); }
  .composer-inner { max-width: 824px; margin: 0 auto; }
  .input-box { display: flex; gap: 8px; align-items: flex-end; background: var(--s1); border: 1px solid var(--line-2);
    border-radius: 16px; padding: 8px 8px 8px 14px; box-shadow: var(--shadow); transition: border-color .18s, box-shadow .18s; }
  .input-box:focus-within { border-color: var(--accent); box-shadow: var(--shadow), 0 0 0 3px color-mix(in srgb, var(--accent) 14%, transparent); }
  #input { flex: 1; resize: none; background: none; border: 0; color: var(--text); font: inherit; outline: none;
    max-height: 220px; padding: 6px 0; }
  #input::placeholder { color: var(--faint); }
  .send-btn { display: grid; place-items: center; width: 38px; height: 38px; border: 0; border-radius: 11px;
    background: var(--accent); color: var(--accent-ink); transition: .15s; flex: 0 0 auto; }
  .send-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
  .send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 18px; height: 18px; }
  #stopBtn { background: var(--danger); color: #fff; display: none; }
  .hint { max-width: 824px; margin: 8px auto 0; font-size: 11.5px; color: var(--faint); text-align: center; }
  .hint kbd { font-family: 'Geist Mono', monospace; background: var(--s2); border: 1px solid var(--line); border-radius: 5px; padding: 1px 5px; font-size: 11px; }

  /* 回到底部 */
  #toBottom { position: absolute; right: 28px; bottom: 92px; width: 36px; height: 36px; border-radius: 50%;
    background: var(--s2); border: 1px solid var(--line-2); color: var(--dim); display: none; place-items: center;
    box-shadow: var(--shadow); transition: .15s; z-index: 4; }
  #toBottom:hover { color: var(--text); transform: translateY(-2px); }
  #toBottom.show { display: grid; }

  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: none; } }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(.5); opacity: .4; } 40% { transform: scale(1); opacity: 1; } }
  @media (max-width: 760px) {
    #sidebar { position: absolute; z-index: 20; height: 100%; box-shadow: var(--shadow); }
    #sidebar.hidden { margin-left: -284px; }
    #menuBtn { display: grid; }
  }
</style>
</head>
<body>
<aside id="sidebar">
  <div class="brand">
    <div class="mark" id="brandMark"></div>
    <div class="name">claude<b>·</b>web</div>
    <div class="spacer"></div>
    <button class="iconbtn sm" id="themeBtn" title="切换主题"></button>
  </div>
  <div class="side-pad">
    <button id="newBtn"></button>
    <div class="search-wrap">
      <span id="searchIcon"></span>
      <input id="search" placeholder="搜索会话">
    </div>
  </div>
  <div id="convList"></div>
  <div class="side-foot"><span class="live"></span><span>本地复用 claude / codex · 会话独立 · /resume 不可见</span></div>
</aside>

<section id="main">
  <div id="header">
    <button class="iconbtn" id="menuBtn" title="菜单"></button>
    <span id="hTitle">claude·web</span>
    <span id="hBadge"></span>
    <span class="hspacer"></span>
    <button class="iconbtn" id="sysBtn" title="系统提示词"></button>
    <button class="iconbtn" id="exportBtn" title="导出为 Markdown"></button>
  </div>
  <div id="thread"></div>
  <button id="toBottom" title="回到底部"></button>
  <div id="composer">
    <div class="composer-inner">
      <div class="input-box">
        <textarea id="input" rows="1" placeholder="给 claude / codex 发消息…"></textarea>
        <button class="send-btn" id="sendBtn" title="发送"></button>
        <button class="send-btn" id="stopBtn" title="停止生成"></button>
      </div>
      <div class="hint"><kbd>Enter</kbd> 发送 · <kbd>Shift</kbd>+<kbd>Enter</kbd> 换行</div>
    </div>
  </div>
</section>

<script src="/vendor/marked.min.js"></script>
<script src="/vendor/purify.min.js"></script>
<script src="/vendor/highlight.min.js"></script>
<script>

  stop: '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2.5"/></svg>',
  copy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>',
  check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>',
  user: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0116 0"/></svg>',
  code: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/></svg>',
  menu: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>',
  arrowDown: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>',
  sun: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>',
  moon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"/></svg>',
  warn: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9L1.8 18a2 2 0 001.7 3h17a2 2 0 001.7-3L13.7 3.9a2 2 0 00-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg>',
};
const provGlyph = (p) => p === 'codex' ? I.code : I.spark;

let CONFIG = null;
let state = { current: null, streaming: false };

/* ---------- 主题 ---------- */
function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  localStorage.setItem('cw-theme', t);
  $('#themeBtn').innerHTML = t === 'dark' ? I.sun : I.moon;
}
applyTheme(localStorage.getItem('cw-theme') || 'dark');

/* ---------- 静态图标注入 ---------- */
$('#brandMark').innerHTML = I.spark;
$('#newBtn').innerHTML = I.plus + '<span>新建对话</span>';
$('#searchIcon').innerHTML = I.search;
$('#sysBtn').innerHTML = I.gear;
$('#exportBtn').innerHTML = I.download;
$('#menuBtn').innerHTML = I.menu;
$('#sendBtn').innerHTML = I.send;
$('#stopBtn').innerHTML = I.stop;
$('#toBottom').innerHTML = I.arrowDown;

/* ---------- Markdown ---------- */
marked.setOptions({ breaks: true, gfm: true });
function renderMarkdown(el, text) {
  el.innerHTML = DOMPurify.sanitize(marked.parse(text || ''));
  el.querySelectorAll('pre').forEach((pre) => {
    const code = pre.querySelector('code');
    if (!code) return;
    try { hljs.highlightElement(code); } catch {}
    const lang = (code.className.match(/language-(\w+)/) || [])[1] || 'text';
    if (!pre.querySelector('.codebar')) {
      const bar = document.createElement('div');
      bar.className = 'codebar';
      bar.innerHTML = `<span class="lang">${esc(lang)}</span><button class="copybtn">${I.copy}<span>复制</span></button>`;
      bar.querySelector('.copybtn').onclick = (e) => {
        e.stopPropagation();
        navigator.clipboard.writeText(code.textContent);
        const b = bar.querySelector('.copybtn');
        b.innerHTML = I.check + '<span>已复制</span>';
        setTimeout(() => b.innerHTML = I.copy + '<span>复制</span>', 1300);
      };
      pre.prepend(bar);
    }
  });
}

/* ---------- API ---------- */
const api = {
  config: () => fetch('/api/config').then(r => r.json()),
  list: () => fetch('/api/conversations').then(r => r.json()),
  get: (id) => fetch('/api/conversations/' + id).then(r => r.json()),
  create: (b) => fetch('/api/conversations', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(b) }).then(r => r.json()),
  patch: (id, b) => fetch('/api/conversations/' + id, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(b) }).then(r => r.json()),
  del: (id) => fetch('/api/conversations/' + id, { method: 'DELETE' }).then(r => r.json()),
  stop: (id) => fetch('/api/conversations/' + id + '/stop', { method: 'POST' }),
};

/* ---------- 侧栏列表（按日期分组） ---------- */
let allConvs = [];
async function refreshList() { allConvs = await api.list(); drawList(); }
function dayGroup(iso) {
  if (!iso) return '更早';
  const d = new Date(iso), now = new Date();
  const day = (x) => new Date(x.getFullYear(), x.getMonth(), x.getDate()).getTime();
  const diff = (day(now) - day(d)) / 86400000;
  if (diff <= 0) return '今天';
  if (diff === 1) return '昨天';
  if (diff <= 7) return '近 7 天';
  if (diff <= 30) return '近 30 天';
  return '更早';
}
function drawList() {
  const q = $('#search').value.trim().toLowerCase();
  const list = $('#convList'); list.innerHTML = '';
  const items = allConvs.filter(c => !q || (c.title || '').toLowerCase().includes(q) || (c.lastText || '').toLowerCase().includes(q));
  let lastGroup = null, idx = 0;
  for (const c of items) {
    const g = dayGroup(c.updatedAt);
    if (g !== lastGroup) { lastGroup = g; const h = document.createElement('div'); h.className = 'group-label'; h.textContent = g; list.appendChild(h); }
    const div = document.createElement('div');
    div.className = 'conv' + (state.current && state.current.id === c.id ? ' active' : '');
    div.style.animationDelay = (idx++ * 18) + 'ms';
    div.innerHTML = `<div class="t">
        <span class="dot ${c.provider}"></span>
        <span class="name">${esc(c.title || '新对话')}</span>
        <span class="acts">
          <button class="iconbtn sm" data-act="rename" title="重命名">${I.edit}</button>
          <button class="iconbtn sm" data-act="del" title="删除">${I.trash}</button>
        </span>
      </div>
      <div class="sub">${esc(c.model || '默认')} · ${c.messageCount} 条消息</div>`;
    div.onclick = (e) => {
      const b = e.target.closest('[data-act]');
      if (b && b.dataset.act === 'rename') { e.stopPropagation(); doRename(c); }
      else if (b && b.dataset.act === 'del') { e.stopPropagation(); doDelete(c); }
      else openConversation(c.id);
    };
    list.appendChild(div);
  }
}
async function doRename(c) {
  const t = prompt('重命名会话', c.title || '');
  if (t != null) { await api.patch(c.id, { title: t }); if (state.current?.id === c.id) { state.current.title = t; drawHeader(); } refreshList(); }
}
async function doDelete(c) {
  if (!confirm(`删除会话「${c.title || '新对话'}」？`)) return;
  await api.del(c.id);
  if (state.current?.id === c.id) newDraft();
  refreshList();
}

/* ---------- 打开 / 渲染会话 ---------- */
async function openConversation(id) {
  const c = await api.get(id);
  if (c.error) return;
  state.current = c;
  drawHeader(); drawThread(); drawList();
  if (window.innerWidth <= 760) $('#sidebar').classList.add('hidden');
}
function drawHeader() {
  const c = state.current;
  $('#hTitle').textContent = c?.title && !c.draft ? c.title : 'claude·web';
  const b = $('#hBadge');
  if (c && !c.draft) {
    b.innerHTML = `<span class="pill"><span class="dot ${c.provider}"></span>${esc(c.provider)}</span><span class="pill model">${esc(c.model || '默认')}</span>`;
  } else b.innerHTML = '';
}
function drawThread() {
  const c = state.current;
  const t = $('#thread'); t.innerHTML = '';
  if (!c || (c.messages || []).length === 0) { t.appendChild(emptyNode()); return; }
  for (const m of c.messages) t.appendChild(renderMsg(m));
  jumpBottom();
}
function renderMsg(m) {
  const prov = state.current?.provider || 'claude';
  const div = document.createElement('div');
  div.className = 'msg ' + m.role + (m.role === 'assistant' ? ' ' + prov : '');
  div.innerHTML = `<div class="avatar">${m.role === 'user' ? I.user : provGlyph(prov)}</div>
    <div class="body"><div class="who">${m.role === 'user' ? '你' : esc(prov)}</div><div class="content"></div></div>`;
  const content = div.querySelector('.content');
  if (m.role === 'user') content.textContent = m.content;
  else renderMarkdown(content, m.content);
  if (m.interrupted) content.insertAdjacentHTML('beforeend', '<div class="badge-note">— 已中断 —</div>');
  if (m.error) content.insertAdjacentHTML('beforeend', `<div class="errbox">${I.warn}<span>${esc(m.error)}</span></div>`);
  else if (m.role === 'assistant' && (m.usage || m.cost != null)) content.insertAdjacentHTML('beforeend', metaLine(m));
  return div;
}
function metaLine(m) {
  const u = m.usage || {};
  const parts = [];
  if (u.input_tokens != null) parts.push(`输入 ${u.input_tokens}`);
  if (u.output_tokens != null) parts.push(`输出 ${u.output_tokens}`);
  if (m.cost != null) parts.push(`$${(+m.cost).toFixed(4)}`);
  return parts.length ? `<div class="meta">${parts.join('  ·  ')}</div>` : '';
}

/* ---------- 空态 ---------- */
function emptyNode() {
  const wrap = document.createElement('div'); wrap.id = 'empty';
  const isDraft = !state.current || state.current.draft;
  const prov = state.current?.provider || CONFIG.defaultProvider;
  const models = prov === 'codex' ? CONFIG.codexModels : CONFIG.claudeModels;
  const curModel = state.current?.model ?? (prov === 'codex' ? CONFIG.defaultCodexModel : CONFIG.defaultClaudeModel);
  const opt = (v) => `<option value="${esc(v)}" ${v === curModel ? 'selected' : ''}>${esc(v || '默认 (config.toml)')}</option>`;
  wrap.innerHTML = `
    <div class="hero">${I.spark}</div>
    <h2>开始新对话</h2>
    <p>复用本地 claude / codex 配置，无需登录。会话独立保存，命令行 /resume 看不到这里的记录。</p>
    <div class="picker">
      <div class="field"><label>Provider</label>
        <select id="pProvider" ${isDraft ? '' : 'disabled'}>
          <option value="claude" ${prov === 'claude' ? 'selected' : ''}>claude</option>
          <option value="codex" ${prov === 'codex' ? 'selected' : ''}>codex</option>
        </select></div>
      <div class="field"><label>模型</label><select id="pModel">${models.map(opt).join('')}</select></div>
    </div>
    <div class="picker full"><div class="field" style="display:block"><label>系统提示词（可选）</label>
      <textarea id="pSys" placeholder="留空则使用默认">${esc(state.current?.systemPrompt || '')}</textarea></div></div>
    <div class="avail">
      <span><span class="dot ${CONFIG.providers.claude ? 'on' : 'off'}"></span>claude ${CONFIG.providers.claude ? '可用' : '凭据缺失'}</span>
      <span><span class="dot ${CONFIG.providers.codex ? 'on' : 'off'}"></span>codex ${CONFIG.providers.codex ? '可用' : '凭据缺失'}</span>
    </div>`;
  wrap.querySelector('#pProvider').onchange = (e) => { state.current = makeDraft(e.target.value); drawThread(); };
  return wrap;
}

/* ---------- 草稿 ---------- */
function makeDraft(provider) {
  provider = provider || CONFIG.defaultProvider;
  return { draft: true, provider, model: provider === 'codex' ? CONFIG.defaultCodexModel : CONFIG.defaultClaudeModel, systemPrompt: '', messages: [] };
}
function newDraft() { state.current = makeDraft(CONFIG.defaultProvider); drawHeader(); drawThread(); drawList(); $('#input').focus(); }

/* ---------- 发送 ---------- */
async function send() {
  if (state.streaming) return;
  const input = $('#input');
  const text = input.value.trim();
  if (!text) return;

  if (!state.current || state.current.draft) {
    const prov = $('#pProvider')?.value || state.current?.provider || CONFIG.defaultProvider;
    const model = $('#pModel')?.value ?? '';
    const sys = $('#pSys')?.value || '';
    state.current = await api.create({ provider: prov, model, systemPrompt: sys });
    drawHeader();
  }
  const c = state.current;
  input.value = ''; autoGrow();

  c.messages.push({ role: 'user', content: text });
  const t = $('#thread'); t.innerHTML = '';
  for (const m of c.messages) t.appendChild(renderMsg(m));
  const aDiv = renderMsg({ role: 'assistant', content: '' });
  const aContent = aDiv.querySelector('.content');
  aContent.innerHTML = '<div class="stream-dots"><i></i><i></i><i></i></div>';
  t.appendChild(aDiv);
  jumpBottom();

  setStreaming(true);
  let acc = '', first = true;
  try {
    const resp = await fetch('/api/conversations/' + c.id + '/messages', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }),
    });
    if (!resp.ok) { const e = await resp.json().catch(() => ({})); throw new Error(e.error || ('HTTP ' + resp.status)); }
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let i;
      while ((i = buf.indexOf('\n\n')) >= 0) {
        const chunk = buf.slice(0, i); buf = buf.slice(i + 2);
        if (!chunk.startsWith('data: ')) continue;
        const o = JSON.parse(chunk.slice(6));
        if (o.type === 'delta') {
          if (first) { first = false; aContent.classList.add('cursor'); }
          acc += o.text;
          renderMarkdown(aContent, acc);
          maybeStick();
        } else if (o.type === 'done') {
          aContent.classList.remove('cursor');
          acc = o.text || acc;
          renderMarkdown(aContent, acc);
          if (o.interrupted) aContent.insertAdjacentHTML('beforeend', '<div class="badge-note">— 已中断 —</div>');
          if (o.error) aContent.insertAdjacentHTML('beforeend', `<div class="errbox">${I.warn}<span>${esc(o.error)}</span></div>`);
          else aContent.insertAdjacentHTML('beforeend', metaLine({ usage: o.usage, cost: o.cost }));
        }
      }
    }
  } catch (e) {
    aContent.classList.remove('cursor');
    if (aContent.querySelector('.stream-dots')) aContent.innerHTML = '';
    aContent.insertAdjacentHTML('beforeend', `<div class="errbox">${I.warn}<span>${esc(e.message)}</span></div>`);
  } finally {
    setStreaming(false);
    await openConversation(c.id);
    refreshList();
  }
}
function setStreaming(on) {
  state.streaming = on;
  $('#sendBtn').style.display = on ? 'none' : '';
  $('#stopBtn').style.display = on ? 'grid' : 'none';
}

/* ---------- 滚动 ---------- */
function jumpBottom() { const t = $('#thread'); t.scrollTop = t.scrollHeight; updateToBottom(); }
function atBottom() { const t = $('#thread'); return t.scrollHeight - t.scrollTop - t.clientHeight < 80; }
function maybeStick() { if (atBottom()) jumpBottom(); }
function updateToBottom() { $('#toBottom').classList.toggle('show', !atBottom()); }

/* ---------- 工具 ---------- */
function esc(s) { return (s ?? '').toString().replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
function autoGrow() { const i = $('#input'); i.style.height = 'auto'; i.style.height = Math.min(i.scrollHeight, 220) + 'px'; }

/* ---------- 事件 ---------- */
$('#newBtn').onclick = newDraft;
$('#search').oninput = drawList;
$('#sendBtn').onclick = send;
$('#stopBtn').onclick = () => { if (state.current) api.stop(state.current.id); };
$('#themeBtn').onclick = () => applyTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
$('#menuBtn').onclick = () => $('#sidebar').classList.toggle('hidden');
$('#toBottom').onclick = jumpBottom;
$('#thread').addEventListener('scroll', updateToBottom);
$('#input').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
$('#input').addEventListener('input', autoGrow);
$('#sysBtn').onclick = async () => {
  const c = state.current; if (!c) return;
  const v = prompt('系统提示词（对该会话生效）', c.systemPrompt || '');
  if (v == null) return;
  c.systemPrompt = v;
  if (!c.draft) await api.patch(c.id, { systemPrompt: v });
};
$('#exportBtn').onclick = () => {
  const c = state.current; if (!c || !c.messages?.length) return;
  let md = `# ${c.title}\n\n> ${c.provider} · ${c.model || '默认'}\n\n`;
  for (const m of c.messages) md += `## ${m.role === 'user' ? '你' : c.provider}\n\n${m.content}\n\n`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([md], { type: 'text/markdown' }));
  a.download = (c.title || 'chat') + '.md'; a.click();
};

/* ---------- 初始化 ---------- */
(async () => {
  CONFIG = await api.config();
  await refreshList();
  newDraft();
})();
</script>
</body>
</html>
