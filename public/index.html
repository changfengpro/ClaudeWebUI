<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>claude-web</title>
<link rel="stylesheet" href="/vendor/highlight-github-dark.min.css">
<style>
  :root {
    --bg: #1a1b1e; --bg2: #232427; --bg3: #2c2e33; --line: #3a3c42;
    --fg: #e6e7ea; --fg2: #a8abb2; --accent: #6aa3ff; --accent2: #d08aff;
    --user: #2b3a52; --danger: #ff6b6b; --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { display: flex; font: 14px/1.6 -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif;
    background: var(--bg); color: var(--fg); }

  /* 侧栏 */
  #sidebar { width: 270px; flex: 0 0 270px; background: var(--bg2); border-right: 1px solid var(--line);
    display: flex; flex-direction: column; }
  #sidebar .top { padding: 12px; display: flex; gap: 8px; }
  #newBtn { flex: 1; padding: 9px; background: var(--accent); color: #06131f; border: 0;
    border-radius: var(--radius); font-weight: 600; cursor: pointer; }
  #newBtn:hover { filter: brightness(1.1); }
  #search { margin: 0 12px 8px; padding: 8px 10px; background: var(--bg3); border: 1px solid var(--line);
    border-radius: var(--radius); color: var(--fg); }
  #convList { flex: 1; overflow-y: auto; padding: 4px 8px; }
  .conv { padding: 9px 10px; border-radius: var(--radius); cursor: pointer; margin-bottom: 3px;
    display: flex; flex-direction: column; gap: 3px; }
  .conv:hover { background: var(--bg3); }
  .conv.active { background: var(--bg3); outline: 1px solid var(--accent); }
  .conv .t { display: flex; align-items: center; gap: 6px; }
  .conv .name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge { font-size: 11px; padding: 1px 6px; border-radius: 6px; flex: 0 0 auto; }
  .badge.claude { background: #3a2d52; color: #d3b3ff; }
  .badge.codex { background: #16413a; color: #7fe3c5; }
  .conv .sub { font-size: 12px; color: var(--fg2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv .acts { display: none; gap: 4px; }
  .conv:hover .acts { display: flex; }
  .iconbtn { background: none; border: 0; color: var(--fg2); cursor: pointer; font-size: 13px; padding: 2px 4px; }
  .iconbtn:hover { color: var(--fg); }
  #sidebar .foot { padding: 8px 12px; font-size: 11px; color: var(--fg2); border-top: 1px solid var(--line); }

  /* 主区 */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #header { padding: 10px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 10px; }
  #header .title { font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #header select, #header input { background: var(--bg3); border: 1px solid var(--line); color: var(--fg);
    border-radius: 8px; padding: 5px 8px; }
  #header .iconbtn { font-size: 14px; }

  #thread { flex: 1; overflow-y: auto; padding: 24px 0; }
  .msg { max-width: 820px; margin: 0 auto 18px; padding: 0 24px; display: flex; gap: 12px; }
  .msg .avatar { flex: 0 0 30px; width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center;
    font-size: 13px; font-weight: 700; }
  .msg.user .avatar { background: var(--user); color: #cfe0ff; }
  .msg.assistant .avatar { background: #2d2540; color: var(--accent2); }
  .msg .body { flex: 1; min-width: 0; }
  .msg .who { font-size: 12px; color: var(--fg2); margin-bottom: 3px; }
  .msg .content { word-wrap: break-word; overflow-wrap: anywhere; }
  .msg .content p:first-child { margin-top: 0; }
  .msg .content p:last-child { margin-bottom: 0; }
  .msg .content pre { background: #0d1117; border: 1px solid var(--line); border-radius: 8px;
    padding: 12px; overflow-x: auto; position: relative; }
  .msg .content code:not(pre code) { background: var(--bg3); padding: 1px 5px; border-radius: 5px; font-size: 13px; }
  .msg .content table { border-collapse: collapse; }
  .msg .content th, .msg .content td { border: 1px solid var(--line); padding: 5px 9px; }
  .copybtn { position: absolute; top: 6px; right: 6px; font-size: 11px; background: var(--bg3);
    border: 1px solid var(--line); color: var(--fg2); border-radius: 6px; padding: 2px 7px; cursor: pointer; opacity: 0; }
  pre:hover .copybtn { opacity: 1; }
  .errbox { border: 1px solid var(--danger); color: #ffb3b3; background: #2a1719; padding: 8px 12px;
    border-radius: 8px; font-size: 13px; white-space: pre-wrap; }
  .tag { font-size: 11px; color: var(--fg2); margin-left: 6px; }
  .cursor::after { content: '▋'; color: var(--accent); animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* 起始空态 */
  #empty { margin: auto; text-align: center; color: var(--fg2); max-width: 520px; padding: 20px; }
  #empty h2 { color: var(--fg); }
  .picker { display: flex; gap: 10px; justify-content: center; margin: 16px 0; flex-wrap: wrap; }
  .picker select, .picker input { background: var(--bg3); border: 1px solid var(--line); color: var(--fg);
    border-radius: 8px; padding: 7px 9px; }
  .picker textarea { width: 100%; }

  /* 输入区 */
  #composer { border-top: 1px solid var(--line); padding: 12px 16px; }
  #composer .wrap { max-width: 820px; margin: 0 auto; display: flex; gap: 8px; align-items: flex-end;
    background: var(--bg2); border: 1px solid var(--line); border-radius: 14px; padding: 8px 10px; }
  #input { flex: 1; resize: none; background: none; border: 0; color: var(--fg); font: inherit; outline: none;
    max-height: 200px; }
  #sendBtn, #stopBtn { border: 0; border-radius: 10px; padding: 8px 14px; cursor: pointer; font-weight: 600; }
  #sendBtn { background: var(--accent); color: #06131f; }
  #stopBtn { background: var(--danger); color: #fff; display: none; }
  .hint { max-width: 820px; margin: 6px auto 0; font-size: 11px; color: var(--fg2); text-align: center; }
</style>
</head>
<body>
<aside id="sidebar">
  <div class="top"><button id="newBtn">+ 新建对话</button></div>
  <input id="search" placeholder="搜索会话…">
  <div id="convList"></div>
  <div class="foot">本地复用 claude / codex 配置 · 会话独立 · /resume 不可见</div>
</aside>

<section id="main">
  <div id="header">
    <span class="title" id="hTitle">claude-web</span>
    <span id="hBadge"></span>
    <button class="iconbtn" id="sysBtn" title="系统提示词">⚙</button>
    <button class="iconbtn" id="exportBtn" title="导出">⬇</button>
  </div>

  <div id="thread"></div>

  <div id="composer">
    <div class="wrap">
      <textarea id="input" rows="1" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
      <button id="sendBtn">发送</button>
      <button id="stopBtn">停止</button>
    </div>
    <div class="hint" id="hint"></div>
  </div>
</section>

<script src="/vendor/marked.min.js"></script>
<script src="/vendor/purify.min.js"></script>
<script src="/vendor/highlight.min.js"></script>
<script>
const $ = (s) => document.querySelector(s);
let CONFIG = null;
let state = { current: null, streaming: false };

// ---------- Markdown 渲染 ----------
marked.setOptions({ breaks: true, gfm: true });
function renderMarkdown(el, text) {
  const html = DOMPurify.sanitize(marked.parse(text || ''));
  el.innerHTML = html;
  el.querySelectorAll('pre code').forEach((block) => {
    try { hljs.highlightElement(block); } catch {}
    const pre = block.parentElement;
    if (!pre.querySelector('.copybtn')) {
      const b = document.createElement('button');
      b.className = 'copybtn'; b.textContent = '复制';
      b.onclick = () => { navigator.clipboard.writeText(block.textContent); b.textContent = '已复制'; setTimeout(() => b.textContent = '复制', 1200); };
      pre.appendChild(b);
    }
  });
}

// ---------- API ----------
const api = {
  config: () => fetch('/api/config').then(r => r.json()),
  list: () => fetch('/api/conversations').then(r => r.json()),
  get: (id) => fetch('/api/conversations/' + id).then(r => r.json()),
  create: (b) => fetch('/api/conversations', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(b) }).then(r => r.json()),
  patch: (id, b) => fetch('/api/conversations/' + id, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(b) }).then(r => r.json()),
  del: (id) => fetch('/api/conversations/' + id, { method: 'DELETE' }).then(r => r.json()),
  stop: (id) => fetch('/api/conversations/' + id + '/stop', { method: 'POST' }),
};

// ---------- 侧栏 ----------
let allConvs = [];
async function refreshList() {
  allConvs = await api.list();
  drawList();
}
function drawList() {
  const q = $('#search').value.trim().toLowerCase();
  const list = $('#convList'); list.innerHTML = '';
  for (const c of allConvs) {
    if (q && !(c.title || '').toLowerCase().includes(q) && !(c.lastText || '').toLowerCase().includes(q)) continue;
    const div = document.createElement('div');
    div.className = 'conv' + (state.current && state.current.id === c.id ? ' active' : '');
    div.innerHTML = `<div class="t">
        <span class="name">${esc(c.title || '新对话')}</span>
        <span class="badge ${c.provider}">${c.provider}</span>
        <span class="acts">
          <button class="iconbtn" data-act="rename" title="重命名">✎</button>
          <button class="iconbtn" data-act="del" title="删除">🗑</button>
        </span>
      </div>
      <div class="sub">${esc(c.model || '默认')} · ${c.messageCount} 条</div>`;
    div.onclick = (e) => {
      const act = e.target.dataset.act;
      if (act === 'rename') { e.stopPropagation(); doRename(c); }
      else if (act === 'del') { e.stopPropagation(); doDelete(c); }
      else openConversation(c.id);
    };
    list.appendChild(div);
  }
}
async function doRename(c) {
  const t = prompt('重命名会话', c.title || '');
  if (t != null) { await api.patch(c.id, { title: t }); if (state.current?.id === c.id) state.current.title = t; refreshList(); drawHeader(); }
}
async function doDelete(c) {
  if (!confirm(`删除会话「${c.title || '新对话'}」？`)) return;
  await api.del(c.id);
  if (state.current?.id === c.id) newDraft();
  refreshList();
}

// ---------- 打开 / 渲染会话 ----------
async function openConversation(id) {
  const c = await api.get(id);
  if (c.error) return;
  state.current = c;
  drawHeader(); drawThread(); drawList();
}
function drawHeader() {
  const c = state.current;
  $('#hTitle').textContent = c?.title || 'claude-web';
  const badge = $('#hBadge');
  if (c && !c.draft) {
    badge.innerHTML = `<span class="badge ${c.provider}">${c.provider}</span> <span class="tag">${esc(c.model || '默认')}</span>`;
  } else badge.innerHTML = '';
}
function drawThread() {
  const c = state.current;
  const t = $('#thread'); t.innerHTML = '';
  if (!c || (c.messages || []).length === 0) { drawEmpty(); return; }
  for (const m of c.messages) t.appendChild(renderMsg(m));
  t.scrollTop = t.scrollHeight;
}
function renderMsg(m) {
  const div = document.createElement('div');
  div.className = 'msg ' + m.role;
  const who = m.role === 'user' ? '你' : (state.current?.provider || 'AI');
  div.innerHTML = `<div class="avatar">${m.role === 'user' ? '你' : 'AI'}</div>
    <div class="body"><div class="who">${esc(who)}</div><div class="content"></div></div>`;
  const content = div.querySelector('.content');
  if (m.role === 'user') content.textContent = m.content;
  else renderMarkdown(content, m.content);
  if (m.interrupted) content.insertAdjacentHTML('beforeend', '<div class="tag">（已中断）</div>');
  if (m.error) content.insertAdjacentHTML('beforeend', `<div class="errbox">⚠ ${esc(m.error)}</div>`);
  return div;
}
function drawEmpty() {
  const t = $('#thread');
  const isDraft = !state.current || state.current.draft;
  const prov = state.current?.provider || CONFIG.defaultProvider;
  const models = prov === 'codex' ? CONFIG.codexModels : CONFIG.claudeModels;
  const curModel = state.current?.model ?? (prov === 'codex' ? CONFIG.defaultCodexModel : CONFIG.defaultClaudeModel);
  const opt = (v) => `<option value="${esc(v)}" ${v === curModel ? 'selected' : ''}>${esc(v || '默认(config.toml)')}</option>`;
  t.innerHTML = `<div id="empty">
    <h2>新对话</h2>
    <p>复用本地 claude / codex 配置，无需登录。会话独立保存，CLI 的 /resume 看不到。</p>
    <div class="picker">
      <select id="pProvider" ${isDraft ? '' : 'disabled'}>
        <option value="claude" ${prov === 'claude' ? 'selected' : ''}>claude</option>
        <option value="codex" ${prov === 'codex' ? 'selected' : ''}>codex</option>
      </select>
      <select id="pModel">${models.map(opt).join('')}</select>
    </div>
    <div class="picker"><textarea id="pSys" rows="2" placeholder="可选：系统提示词">${esc(state.current?.systemPrompt || '')}</textarea></div>
    <p style="font-size:12px">codex 可用：${CONFIG.providers.codex ? '是' : '凭据缺失'} · claude 可用：${CONFIG.providers.claude ? '是' : '凭据缺失'}</p>
  </div>`;
  $('#pProvider').onchange = (e) => { state.current = makeDraft(e.target.value); drawEmpty(); };
}

// ---------- 草稿（新会话未落库）----------
function makeDraft(provider) {
  provider = provider || CONFIG.defaultProvider;
  return { draft: true, provider, model: provider === 'codex' ? CONFIG.defaultCodexModel : CONFIG.defaultClaudeModel,
    systemPrompt: '', messages: [] };
}
function newDraft() { state.current = makeDraft(CONFIG.defaultProvider); drawHeader(); drawThread(); drawList(); }

// ---------- 发送 ----------
async function send() {
  if (state.streaming) return;
  const input = $('#input');
  const text = input.value.trim();
  if (!text) return;

  // 草稿：先落库
  if (!state.current || state.current.draft) {
    const prov = $('#pProvider')?.value || state.current?.provider || CONFIG.defaultProvider;
    const model = $('#pModel')?.value ?? '';
    const sys = $('#pSys')?.value || '';
    const c = await api.create({ provider: prov, model, systemPrompt: sys });
    state.current = c;
    drawHeader();
  }
  const c = state.current;
  input.value = ''; autoGrow();

  // 立即渲染用户消息 + 空助手气泡
  c.messages.push({ role: 'user', content: text });
  $('#thread').innerHTML = '';
  for (const m of c.messages) $('#thread').appendChild(renderMsg(m));
  const aMsg = { role: 'assistant', content: '' };
  const aDiv = renderMsg(aMsg);
  const aContent = aDiv.querySelector('.content');
  aContent.classList.add('cursor');
  $('#thread').appendChild(aDiv);
  $('#thread').scrollTop = $('#thread').scrollHeight;

  setStreaming(true);
  let acc = '';
  try {
    const resp = await fetch('/api/conversations/' + c.id + '/messages', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }),
    });
    if (!resp.ok) { const e = await resp.json().catch(() => ({})); throw new Error(e.error || ('HTTP ' + resp.status)); }
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf('\n\n')) >= 0) {
        const chunk = buf.slice(0, idx); buf = buf.slice(idx + 2);
        if (!chunk.startsWith('data: ')) continue;
        const o = JSON.parse(chunk.slice(6));
        if (o.type === 'delta') {
          acc += o.text;
          renderMarkdown(aContent, acc);
          $('#thread').scrollTop = $('#thread').scrollHeight;
        } else if (o.type === 'done') {
          aContent.classList.remove('cursor');
          acc = o.text || acc;
          renderMarkdown(aContent, acc);
          if (o.interrupted) aContent.insertAdjacentHTML('beforeend', '<div class="tag">（已中断）</div>');
          if (o.error) aContent.insertAdjacentHTML('beforeend', `<div class="errbox">⚠ ${esc(o.error)}</div>`);
        }
      }
    }
  } catch (e) {
    aContent.classList.remove('cursor');
    aContent.insertAdjacentHTML('beforeend', `<div class="errbox">⚠ ${esc(e.message)}</div>`);
  } finally {
    setStreaming(false);
    await openConversation(c.id);  // 重新拉取（含落库后的标题、cliSessionId）
    refreshList();
  }
}
function setStreaming(on) {
  state.streaming = on;
  $('#sendBtn').style.display = on ? 'none' : '';
  $('#stopBtn').style.display = on ? '' : 'none';
}

// ---------- 工具 ----------
function esc(s) { return (s ?? '').toString().replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
function autoGrow() { const i = $('#input'); i.style.height = 'auto'; i.style.height = Math.min(i.scrollHeight, 200) + 'px'; }

// ---------- 事件绑定 ----------
$('#newBtn').onclick = newDraft;
$('#search').oninput = drawList;
$('#sendBtn').onclick = send;
$('#stopBtn').onclick = () => { if (state.current) api.stop(state.current.id); };
$('#input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
$('#input').addEventListener('input', autoGrow);
$('#sysBtn').onclick = async () => {
  const c = state.current; if (!c) return;
  const v = prompt('系统提示词（对该会话生效；codex 仅新会话首轮生效）', c.systemPrompt || '');
  if (v == null) return;
  c.systemPrompt = v;
  if (!c.draft) await api.patch(c.id, { systemPrompt: v });
};
$('#exportBtn').onclick = () => {
  const c = state.current; if (!c || !c.messages?.length) return;
  let md = `# ${c.title}\n\n*${c.provider} · ${c.model || '默认'}*\n\n`;
  for (const m of c.messages) md += `## ${m.role === 'user' ? '你' : c.provider}\n\n${m.content}\n\n`;
  const blob = new Blob([md], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = (c.title || 'chat') + '.md'; a.click();
};

// ---------- 初始化 ----------
(async () => {
  CONFIG = await api.config();
  await refreshList();
  newDraft();
})();
</script>
</body>
</html>
